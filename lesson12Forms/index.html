<!DOCTYPE html>
<html lang="en">
<head>
    <title>forms</title>
</head>
<body>
    
    <form action="index.php" method="post" enctype="multipart/form-date">
        <label for="username">username:</label>
        <input type="text" id="username" required minlength="6" maxlength="25" placeholder="name"><br>

        <label for="password">password:</label>
        <input type="password" id="password" required minlength="6" maxlength="25"><br>

        <label for="email">email:</label>
        <input type="text" id="email" placeholder="fake123@fake.com" required><br>

        <label for="phone">phone:</label>
        <input type="tel" id="phone" placeholder="123-456-7890" required pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"><br>

        <label for="bday">birthdate:</label>
        <input type="date" id="bday"><br>

        <label for="quantity">quantity:</label>
        <input type="number" id="quantity" min="0" max="99" value="1"><br>

        <label for="title">title:</label>

        <label for="Mr.">Mr.</label>
        <input type="radio" id="Mr." value="Mr." name="class">
        <label for="Ms.">Ms.</label>
        <input type="radio" id="Ms." value="Ms." name="class">
        <label for="PhD.">PhD.</label>
        <input type="radio" id="PhD." value="PhD." name="class"><br>

        <label for="payment">payment:</label>
        <select id="payment">
            <option value="visa">visa</option>
            <option value="mastercard">mastercard</option>
            <option value="giftcard">giftcard</option>
        </select><br>

        <label for="subscribe">subscribe:</label>
        <input type="checkbox" id="subscribe"><br>

        <label for="comment">comment:</label>
        <textarea id="comment" row="3" cols="25"></textarea><br>

        <label for="file">file:</label>
        <input type="file" id="file" accept="image/png, image/jpeg"><br>

        <br><input type="reset">
        <input type="submit">
    </form>

</body>
</html>
